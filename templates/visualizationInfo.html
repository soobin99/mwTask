<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시각화 과제 안내</title>
    <link rel="stylesheet" href="../static/js/styles.css">
</head>
<body>
    <main class="page-shell">
        <section class="content-panel menu-panel">
            <p class="eyebrow">Visualization Task</p>
            <h1 onclick="revealSkipButton('skipVisualizationButton')">시각화 과제</h1>
            <p class="lead">
                세부 내용 추가 예정 - 본 시각화 과제는 두가지로 구성되어있습니다.
                하나는 VLAT이고 하나는 SV TASK입니다.
            </p>
            <button class="primary-button" type="button" onclick="startVlatFlow()">다음으로</button>
            <button id="skipVisualizationButton" class="menu-button secondary inline-action hidden" type="button" onclick="skipVisualizationSet('vlat')">건너뛰기</button>
        </section>
    </main>
    <script src="../static/js/taskFlow.js"></script>
    <script src="../static/js/vlatFlow.js"></script>
</body>
</html>
