<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>시각화 과제 안내</title>
    <link rel="stylesheet" href="../static/js/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="content-panel menu-panel">
        <p
          class="eyebrow"
          onclick="revealSkipButton('skipVisualizationButton')"
        >
          Visualization Literacy Assessment Test
        </p>
        <h1>시각화 과제</h1>
        <p class="lead">
          본 시각화 과제는 시각화 문해력 평가 테스트(Visualization Literacy
          Assessment Test; VLAT)로 사용자가 데이터 시각화를 읽고 이해하며 문제를
          해결하는 능력을 측정하기 위해 개발되었습니다. 각 문제를 해결한 후
          NASA-TLX 설문조사가 이어집니다.
        </p>
        <button class="primary-button" type="button" onclick="startVlatFlow()">
          다음으로
        </button>
        <button
          id="skipVisualizationButton"
          class="menu-button secondary inline-action hidden"
          type="button"
          onclick="skipVisualizationSet('vlat')"
        >
          건너뛰기
        </button>
      </section>
    </main>
    <script src="../static/js/taskFlow.js"></script>
    <script src="../static/js/vlatFlow.js"></script>
  </body>
</html>
