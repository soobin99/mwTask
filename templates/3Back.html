<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Back</title>
    <link rel="stylesheet" href="../static/js/styles.css">
</head>
<body class="task-page">
    <main class="page-shell">
        <section class="content-panel task-panel">
            <h1 class="task-title">3-Back</h1>
            <div id="description" class="task-description">
                이미지는 0.5초 동안 표시된 뒤 2.5초 동안 사라집니다.<br>
                현재 이미지가 3단계 이전 이미지와 같다면 “정답입니다”를, 다르다면 “정답이 아닙니다”를 선택해 주세요.
            </div>
            <div class="answer-actions">
                <button id="correctAnsButton" class="answer-button" type="button" onclick="submitAnswer(true)">정답입니다</button>
                <button id="incorrectAnsButton" class="answer-button" type="button" onclick="submitAnswer(false)">정답이 아닙니다</button>
            </div>
            <div class="stimulus-area">
                <img id="nBackImage" class="stimulus-image" src="../static/data/nBackImage/1.svg" alt="n-back stimulus">
            </div>
        </section>
    </main>
    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="../static/js/taskButtons.js"></script>
    <script src="../static/js/taskFlow.js"></script>
    <script src="../static/js/taskConfig.js"></script>
    <script src="../static/js/3back.js"></script>
</body>
</html>
