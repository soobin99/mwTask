<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>시각화 과제 안내 2</title>
    <link rel="stylesheet" href="../static/js/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="content-panel menu-panel">
        <p
          class="eyebrow"
          onclick="revealSkipButton('skipVisualization2Button')"
        >
          Spatial Visualization Task
        </p>
        <h1>시각화 과제</h1>
        <p class="lead">
          각 차트를 꼼꼼히 살펴보고 가장 적절한 답변을 선택해 주세요. 각 문제를
          해결한 후 NASA-TLX 설문조사가 이어집니다.
        </p>
        <button class="primary-button" type="button" onclick="startSvFlow()">
          다음으로
        </button>
        <button
          id="skipVisualization2Button"
          class="menu-button secondary inline-action hidden"
          type="button"
          onclick="skipVisualizationSet('sv')"
        >
          건너뛰기
        </button>
      </section>
    </main>
    <script src="../static/js/taskFlow.js"></script>
    <script src="../static/data/SV/questions.js"></script>
    <script src="../static/js/svFlow.js"></script>
  </body>
</html>
