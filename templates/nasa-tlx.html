<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA-TLX</title>
    <link rel="stylesheet" href="../static/js/styles.css">
</head>
<body>
    <main class="page-shell">
        <section class="content-panel tlx-panel">
            <p class="eyebrow">NASA-TLX</p>
            <h1>과제 부하 설문</h1>
            <p class="lead">방금 수행한 과제에 대해 0부터 100까지 5단위로 선택해 주세요.</p>

            <form id="tlxForm">
                <div id="tlxQuestions" class="tlx-list"></div>
                <button id="tlxActionButton" class="primary-button" type="button" data-state="submit">제출하기</button>
            </form>
        </section>
    </main>

    <script src="../static/js/taskFlow.js"></script>
    <script src="../static/js/vlatFlow.js"></script>
    <script src="../static/js/svFlow.js"></script>
    <script>
        const questions = [
            {key: 'mental', label: '문제가 얼마나 어려웠습니까?'},
            {key: 'physical', label: '문제를 푸는데 신체적으로 얼마나 어려웠습니까?'},
            {key: 'temporal', label: '문제를 푸는데 시간적 압박을 느꼈습니까?'},
            {key: 'performance', label: '문제를 얼마나 정확하게 푼 것 같습니까? (정답에 대한 확신)'},
            {key: 'frustration', label: '문제를 직면하고 해결하는데 있어서 당황스럽거나 부담스러웠던 정도가 어떻게 됩니까?'},
            {key: 'effort', label: '문제를 푸는데 얼마나 집중하고 신경을 썼습니까?'}
        ];
        const result = JSON.parse(sessionStorage.getItem('currentTaskResult') || 'null');
        const questionsEl = document.getElementById('tlxQuestions');
        const actionButton = document.getElementById('tlxActionButton');
        const isVlatFlow = sessionStorage.getItem('currentFlow') === 'vlat';
        const isLastVlat = isVlatFlow && isLastVlatTask();
        const isSvFlow = sessionStorage.getItem('currentFlow') === 'sv';
        const isLastSv = isSvFlow && isLastSvTask();

        if ((isVlatFlow && !isLastVlat) || (isSvFlow && !isLastSv)) {
            actionButton.textContent = '다음으로';
            actionButton.dataset.state = isSvFlow ? 'sv-next' : 'vlat-next';
        }

        questions.forEach((question, questionIndex) => {
            const group = document.createElement('fieldset');
            group.className = 'tlx-question';
            group.innerHTML = `<legend>${question.label}</legend>`;

            const choices = document.createElement('label');
            choices.className = 'tlx-select-row';
            const options = [];
            for (let score = 0; score <= 100; score += 5) {
                options.push(`<option value="${score}">${score}</option>`);
            }
            choices.innerHTML = `
                <select name="q${questionIndex}">
                    ${options.join('')}
                </select>
            `;

            group.appendChild(choices);
            questionsEl.appendChild(group);
        });

        function isComplete() {
            return questions.every((_, index) => {
                return document.querySelector(`select[name="q${index}"]`).value !== '';
            });
        }

        document.getElementById('tlxForm').addEventListener('change', () => {
            actionButton.classList.toggle('hidden', !isComplete());
        });

        actionButton.addEventListener('click', () => {
            if (actionButton.dataset.state === 'next') {
                if (sessionStorage.getItem('vlatNextPath')) {
                    advanceVlatAfterTlx();
                } else if (sessionStorage.getItem('svNextPath')) {
                    advanceSvAfterTlx();
                } else if (sessionStorage.getItem('currentFlow') === 'vlat') {
                    advanceVlatAfterTlx();
                } else if (sessionStorage.getItem('currentFlow') === 'sv') {
                    advanceSvAfterTlx();
                } else {
                    advanceToNextTask();
                }
                return;
            }

            if (actionButton.dataset.state === 'sv-next') {
                const scores = questions.map((question, index) => ({
                    question: question.key,
                    score: document.querySelector(`select[name="q${index}"]`).value
                }));
                continueSvAfterTlx(scores);
                return;
            }

            if (actionButton.dataset.state === 'vlat-next') {
                const scores = questions.map((question, index) => ({
                    question: question.key,
                    score: document.querySelector(`select[name="q${index}"]`).value
                }));
                continueVlatAfterTlx(scores);
                return;
            }

            if (!isComplete()) return;
            const scores = questions.map((question, index) => ({
                question: question.key,
                score: document.querySelector(`select[name="q${index}"]`).value
            }));
            if (sessionStorage.getItem('currentFlow') === 'vlat') {
                saveVlatTlx(scores);
            } else if (sessionStorage.getItem('currentFlow') === 'sv') {
                saveSvTlx(scores);
            } else {
                if (!result) return;
                downloadTaskCsv(result.taskName, result.rows, scores);
            }

            actionButton.dataset.state = 'next';
            actionButton.textContent = '다음으로';
        });
    </script>
</body>
</html>
