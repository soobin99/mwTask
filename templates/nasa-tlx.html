<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA-TLX</title>
    <link rel="stylesheet" href="../static/js/styles.css">
</head>
<body>
    <main class="page-shell">
        <section class="content-panel tlx-panel">
            <p class="eyebrow">NASA-TLX</p>
            <h1>과제 부하 설문</h1>
            <p class="lead">방금 수행한 과제에 대해 0부터 100까지 5단위로 선택해 주세요.</p>

            <form id="tlxForm">
                <div id="tlxQuestions" class="tlx-list"></div>
                <button id="submitTlxButton" class="primary-button hidden" type="button">제출</button>
                <button id="nextTaskButton" class="primary-button hidden" type="button">다음으로</button>
            </form>
        </section>
    </main>

    <script src="../static/js/taskFlow.js"></script>
    <script src="../static/js/vlatFlow.js"></script>
    <script>
        const questions = [
            {key: 'mental', label: '문제가 얼마나 어려웠습니까?'},
            {key: 'physical', label: '문제를 푸는데 신체적으로 얼마나 어려웠습니까?'},
            {key: 'temporal', label: '문제를 푸는데 시간적 압박을 느꼈습니까?'},
            {key: 'performance', label: '문제를 얼마나 정확하게 푼 것 같습니까? (정답에 대한 확신)'},
            {key: 'frustration', label: '문제를 직면하고 해결하는데 있어서 당황스럽거나 부담스러웠던 정도가 어떻게 됩니까?'},
            {key: 'effort', label: '문제를 푸는데 얼마나 집중하고 신경을 썼습니까?'}
        ];
        const result = JSON.parse(sessionStorage.getItem('currentTaskResult') || 'null');
        const questionsEl = document.getElementById('tlxQuestions');
        const submitButton = document.getElementById('submitTlxButton');
        const nextButton = document.getElementById('nextTaskButton');

        questions.forEach((question, questionIndex) => {
            const group = document.createElement('fieldset');
            group.className = 'tlx-question';
            group.innerHTML = `<legend>${question.label}</legend>`;

            const choices = document.createElement('label');
            choices.className = 'tlx-slider-row';
            choices.innerHTML = `
                <input type="range" name="q${questionIndex}" min="0" max="100" step="5" value="50" data-touched="false">
                <output>50</output>
            `;

            group.appendChild(choices);
            questionsEl.appendChild(group);
        });

        function isComplete() {
            return questions.every((_, index) => {
                return document.querySelector(`input[name="q${index}"]`).dataset.touched === 'true';
            });
        }

        document.getElementById('tlxForm').addEventListener('input', (event) => {
            if (event.target.type === 'range') {
                event.target.dataset.touched = 'true';
                event.target.nextElementSibling.value = event.target.value;
            }
            submitButton.classList.toggle('hidden', !isComplete());
        });

        submitButton.addEventListener('click', () => {
            if (!isComplete()) return;
            const scores = questions.map((question, index) => ({
                question: question.key,
                score: document.querySelector(`input[name="q${index}"]`).value
            }));
            if (sessionStorage.getItem('currentFlow') === 'vlat') {
                saveVlatTlxAndContinue(scores);
                return;
            }
            if (!result) return;
            downloadTaskCsv(result.taskName, result.rows, scores);
            submitButton.classList.add('hidden');
            nextButton.classList.remove('hidden');
        });

        nextButton.addEventListener('click', advanceToNextTask);
    </script>
</body>
</html>
