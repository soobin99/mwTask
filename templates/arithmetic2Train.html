<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arithmetic 2-frame Train</title>
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body class="task-page">
    <main class="page-shell">
        <section class="content-panel task-panel">
            <div class="training-info">
                <div class="number-preview vertical-preview">
                    <div class="pair-box highlight-frame"><span>4</span><span>5</span></div>
                    <div class="pair-box highlight-frame"><span>6</span><span>5</span></div>
                </div>
                <div>
                    <h2>Arithmetic 2-frame Train 안내</h2>
                    <p>두 박스의 숫자 4개 합이 20인지 판단합니다. 20이면 “정답입니다”, 아니면 “정답이 아닙니다”를 선택해 주세요.</p>
                </div>
            </div>
            <h1 class="task-title">Arithmetic 2-frame Train</h1>
            <div id="description" class="task-description">
                숫자는 0.5초 동안 표시된 뒤 2.5초 동안 사라집니다.<br>
                이전 숫자들과 현재 숫자들의 합이 20이면 “정답입니다”를, 아니면 “정답이 아닙니다”를 선택해 주세요.
            </div>
            <div id="trainFeedback" class="train-feedback"></div>
            <div class="answer-actions">
                <button id="correctAnsButton" class="answer-button" type="button" onclick="submitAnswer(true)">정답입니다</button>
                <button id="incorrectAnsButton" class="answer-button" type="button" onclick="submitAnswer(false)">정답이 아닙니다</button>
            </div>
            <div id="number" class="number-stimulus">
                <span id="num1"></span>
                <span id="num2"></span>
            </div>
        </section>
    </main>
    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="../static/taskButtons.js"></script>
    <script src="../static/arithmetic2Train.js"></script>
</body>
</html>
