<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arithmetic 1-frame Train</title>
    <link rel="stylesheet" href="../static/js/styles.css">
</head>
<body class="task-page">
    <main class="page-shell">
        <section class="content-panel task-panel">
            <div class="training-info">
                <div class="number-preview vertical-preview">
                    <div class="pair-box highlight-frame"><span>4</span><span>6</span></div>
                </div>
                <div>
                    <h2>Arithmetic 1-frame Train 안내</h2>
                    <p>한 박스 안의 두 숫자 합이 10인지 판단합니다. 10이면 “정답입니다”, 아니면 “정답이 아닙니다”를 선택해 주세요.</p>
                </div>
            </div>
            <h1 class="task-title">Arithmetic 1-frame Train</h1>
            <div id="description" class="task-description">
                숫자는 0.5초 동안 표시된 뒤 2.5초 동안 사라집니다.<br>
                처음 5개는 답을 선택해야 다음으로 넘어가고, 이후 5개는 실제 실험처럼 자동으로 넘어갑니다.<br>
                현재 숫자들의 합이 10이면 “정답입니다”를, 아니면 “정답이 아닙니다”를 선택해 주세요.
            </div>
            <div id="trainFeedback" class="train-feedback"></div>
            <div class="answer-actions">
                <button id="correctAnsButton" class="answer-button" type="button" onclick="submitAnswer(true)">정답입니다</button>
                <button id="incorrectAnsButton" class="answer-button" type="button" onclick="submitAnswer(false)">정답이 아닙니다</button>
            </div>
            <div id="number" class="number-stimulus">
                <span id="num1"></span>
                <span id="num2"></span>
            </div>
        </section>
    </main>
    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="../static/js/taskButtons.js"></script>
    <script src="../static/js/arithmeticTrain.js"></script>
</body>
</html>
